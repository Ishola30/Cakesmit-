<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cakesmith | Premium Cakes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Poppins;
background:#fff7f8;
color:#333;
}

/* NAVBAR */

header{
background:white;
box-shadow:0 3px 15px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
}

.logo{
font-family:"Playfair Display";
font-size:28px;
color:#e91e63;
}

.nav-links a{
margin-left:30px;
text-decoration:none;
color:#444;
font-weight:500;
transition:.3s;
}

.nav-links a:hover{
color:#e91e63;
}

/* HERO */

.hero{
height:90vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1559620192-032c4bc4674e") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-family:"Playfair Display";
font-size:52px;
margin-bottom:20px;
}

.hero p{
font-size:18px;
margin-bottom:30px;
}

.hero a{
background:#e91e63;
padding:14px 34px;
border-radius:40px;
color:white;
text-decoration:none;
font-weight:500;
transition:.3s;
}

.hero a:hover{
background:#c2185b;
}

/* SECTION */

section{
padding:80px 8%;
}

.section-title{
text-align:center;
font-size:36px;
font-family:"Playfair Display";
margin-bottom:50px;
color:#e91e63;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{
padding:20px;
text-align:center;
}

.card-content h3{
margin-bottom:10px;
font-size:18px;
}

.order-btn{
display:inline-block;
margin-top:10px;
background:#e91e63;
color:white;
padding:10px 22px;
border-radius:25px;
text-decoration:none;
font-size:14px;
}

.order-btn:hover{
background:#c2185b;
}

/* WHATSAPP FLOAT */

.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
padding:14px 20px;
border-radius:50px;
text-decoration:none;
font-weight:500;
box-shadow:0 6px 18px rgba(0,0,0,.25);
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:34px;
}

.nav-links a{
margin-left:15px;
}

}

</style>

</head>

<body>

<header>

<nav>

<div class="logo">Cakesmith</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
<a href="#order">Order</a>
</div>

</nav>

</header>

<section class="hero">

<div>

<h1>Luxury Cakes For Every Celebration</h1>

<p>Wedding • Birthday • Cupcakes • Custom Cakes</p>

<a href="#gallery">Browse Cakes</a>

</div>

</section>

<section id="gallery">

<h2 class="section-title">Cake Gallery</h2>

<div class="gallery" id="galleryContainer"></div>

</section>

<section id="order">

<h2 class="section-title">Order Your Cake</h2>

<p style="text-align:center;">
Click any cake to order instantly via WhatsApp
</p>

</section>

<footer>

<p>© 2026 Cakesmith Premium Cakes</p>

</footer>

<a class="whatsapp-float"
href="https://api.whatsapp.com/send?phone=2348137009101&text=Hello%20I%20want%20to%20order%20a%20cake"
target="_blank">
WhatsApp
</a>

<script>

const phone="2348137009101";

const images=[

"https://images.unsplash.com/photo-1535141192574-5d4897c12636",
"https://images.unsplash.com/photo-1551024601-bec78aea704b",
"https://images.unsplash.com/photo-1542826438-bd32f43d626f",
"https://images.unsplash.com/photo-1578985545062-69928b1d9587",
"https://images.unsplash.com/photo-1606313564200-e75d5e30476c",
"https://images.unsplash.com/photo-1559622214-0f8a9857c77b",
"https://images.unsplash.com/photo-1602351447937-745cb720612f",
"https://images.unsplash.com/photo-1612203985729-70726954388c",
"https://images.unsplash.com/photo-1563729784474-d77dbb933a9e",
"https://images.unsplash.com/photo-1557925923-cd4648e211a0"

];

const container=document.getElementById("galleryContainer");

images.forEach((img)=>{

container.innerHTML+=`

<div class="card">

<img src="${img}" alt="Cake">

<div class="card-content">

<h3>Premium Cake</h3>

<a class="order-btn"
href="https://api.whatsapp.com/send?phone=${phone}&text=Hello%20I%20want%20to%20order%20a%20cake"
target="_blank">
Order Cake
</a>

</div>

</div>

`;

});

</script>

</body>
</html>
